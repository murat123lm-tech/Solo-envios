<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Envíos - Cotizador Logístico</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --color-violeta: #6C29BE; --color-amarillo: #FFD700; }
        body { background-color: var(--color-violeta); font-family: 'Segoe UI', sans-serif; color: white; }
        .navbar { background: white; border-bottom: 3px solid var(--color-amarillo); padding: 15px; }
        .hero-section { background: white; color: #333; padding: 20px 0; border-radius: 0 0 40px 40px; text-align: center; }
        .cotizador-card { 
            background: white; color: #333; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: none; 
            padding: 25px; margin-top: -20px;
        }
        #map { height: 350px; width: 100%; border-radius: 15px; border: 2px solid #ddd; margin: 15px 0; z-index: 1; }
        .precio-box { 
            background-color: var(--color-amarillo); color: var(--color-violeta); 
            border-radius: 20px; padding: 20px; text-align: center; margin-top: 15px;
            border: 3px solid var(--color-violeta); display: none;
        }
        #precio-final { font-size: 3rem; font-weight: 900; margin: 0; }
        .btn-cotizar { background-color: var(--color-violeta); color: white; border-radius: 15px; font-weight: bold; width: 100%; margin-top: 10px; border: none; padding: 12px; }
        .form-label { color: var(--color-violeta); font-weight: bold; margin-bottom: 5px; }
        .form-control { border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav class="navbar shadow-sm">
        <div class="container justify-content-center">
            <span class="fs-3 fw-bold" style="color: var(--color-violeta)">SOLO ENVÍOS</span>
        </div>
    </nav>

    <div class="hero-section">
        <div class="container"><h1 class="fw-bold h4">Calculá tu Tarifa de Envío</h1></div>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="cotizador-card">
                    
                    <div class="mb-2">
                        <label class="form-label">📍 DIRECCIÓN DE RETIRO:</label>
                        <input type="text" id="dir-retiro" class="form-control" placeholder="Ej: Av. Ricardo Balbín 1500, San Miguel">
                    </div>

                    <div class="mb-2">
                        <label class="form-label">🏁 DIRECCIÓN DE ENTREGA:</label>
                        <input type="text" id="dir-entrega" class="form-control" placeholder="Ej: Av. Presidente Perón 1850, San Miguel">
                    </div>

                    <button class="btn-cotizar" id="btn-calcular">CALCULAR TARIFA</button>

                    <div id="map"></div>

                    <div id="resultado" class="precio-box">
                        <p class="mb-0 fw-bold">TARIFA ESTIMADA:</p>
                        <p id="precio-final">$0</p>
                        <small id="detalle-distancia" class="text-muted fw-bold"></small>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Inicializar mapa
        var map = L.map('map').setView([-34.5422, -58.7123], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var markerRetiro = L.marker([-34.543, -58.713], {draggable: true}).addTo(map).bindPopup("Retiro");
        var markerEntrega = L.marker([-34.545, -58.715], {draggable: true}).addTo(map).bindPopup("Entrega");

        document.getElementById('btn-calcular').addEventListener('click', function() {
            var r = document.getElementById('dir-retiro').value;
            var e = document.getElementById('dir-entrega').value;

            if(!r || !e) return alert("Por favor, completá ambas direcciones.");

            // Buscamos coordenadas de Retiro
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(r + ", San Miguel, Buenos Aires")}`)
            .then(res => res.json())
            .then(dataR => {
                if(dataR.length > 0) {
                    var latR = dataR[0].lat; var lonR = dataR[0].lon;
                    markerRetiro.setLatLng([latR, lonR]);

                    // Buscamos coordenadas de Entrega
                    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(e + ", San Miguel, Buenos Aires")}`)
                    .then(res => res.json())
                    .then(dataE => {
                        if(dataE.length > 0) {
                            var latE = dataE[0].lat; var lonE = dataE[0].lon;
                            markerEntrega.setLatLng([latE, lonE]);
                            
                            // Ajustar mapa para ver ambos puntos
                            var group = new L.featureGroup([markerRetiro, markerEntrega]);
                            map.fitBounds(group.getBounds().pad(0.2));

                            // CALCULAR TARIFA SEGÚN DISTANCIA (Simulando zonas)
                            var dist = map.distance(markerRetiro.getLatLng(), markerEntrega.getLatLng()) / 1000;
                            var tarifa = 0;

                            // Lógica de Precios por KM (Ajustala a tu gusto)
                            if(dist <= 2) tarifa = 3500; // Zona Centro
                            else if(dist <= 5) tarifa = 4500; // Zonas aledañas
                            else if(dist <= 8) tarifa = 5500; // José C. Paz / Polvorines
                            else tarifa = 6500; // Más lejos

                            document.getElementById('precio-final').innerText = `$${tarifa}`;
                            document.getElementById('detalle-distancia').innerText = `Distancia: ${dist.toFixed(1)} km`;
                            document.getElementById('resultado').style.display = 'block';
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
