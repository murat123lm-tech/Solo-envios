<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Envíos - Cotizador Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --v: #6C29BE; --a: #FFD700; --gray: #f8f9fa; }
        body { background: var(--gray); font-family: 'Inter', sans-serif; color: #333; }
        .navbar { background: var(--v); padding: 20px; border-bottom: 5px solid var(--a); }
        .logo-text { color: white; font-weight: 900; font-size: 1.8rem; }
        .main-card { 
            background: white; border-radius: 30px; padding: 30px; 
            margin-top: -40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }
        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #eee; }
        .form-control:focus { border-color: var(--v); box-shadow: none; }
        .btn-calc { 
            background: var(--v); color: white; border: none; padding: 15px; 
            border-radius: 15px; font-weight: 700; width: 100%; font-size: 1.1rem;
        }
        #map { height: 350px; width: 100%; border-radius: 20px; margin: 20px 0; border: 2px solid #eee; }
        .res-card { 
            background: var(--a); color: var(--v); border-radius: 20px; 
            padding: 20px; text-align: center; display: none; border: 2px solid var(--v);
        }
        .price-tag { font-size: 3rem; font-weight: 900; margin: 5px 0; }
        .loader { width: 20px; height: 20px; border: 3px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="navbar text-center">
        <span class="logo-text"><i class="fa-solid fa-truck-fast"></i> SOLO ENVÍOS</span>
    </nav>

    <div style="height: 80px; background: var(--v);"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="main-card">
                    <div class="mb-3">
                        <label class="fw-bold small text-muted">📍 PUNTO DE RETIRO</label>
                        <input type="text" id="r" class="form-control" placeholder="Calle y altura, San Miguel">
                    </div>

                    <div class="mb-4">
                        <label class="fw-bold small text-muted">🏁 PUNTO DE ENTREGA</label>
                        <input type="text" id="e" class="form-control" placeholder="Calle y altura, San Miguel">
                    </div>

                    <button class="btn-calc" id="btn">
                        <span id="load" class="loader" style="display:none"></span>
                        CALCULAR TARIFA
                    </button>

                    <div id="map"></div>

                    <div id="res" class="res-card">
                        <span class="fw-bold">TARIFA ESTIMADA</span>
                        <div class="price-tag" id="p">$0</div>
                        <p class="small mb-0">Basado en recorrido por calles principales.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración inicial del mapa
        var m = L.map('map', { zoomControl: true }).setView([-34.542, -58.712], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);

        var mR = L.marker([-34.542, -58.712], {draggable:true}).addTo(m).bindPopup("Retiro");
        var mE = L.marker([-34.545, -58.715], {draggable:true}).addTo(m).bindPopup("Entrega");

        async function geo(dir) {
            // Reforzamos la búsqueda para San Miguel, Buenos Aires
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dir + ", San Miguel, Buenos Aires, Argentina")}`;
            const res = await fetch(url);
            const data = await res.json();
            return data.length > 0 ? { lat: data[0].lat, lon: data[0].lon } : null;
        }

        document.getElementById('btn').onclick = async function() {
            const rVal = document.getElementById('r').value;
            const eVal = document.getElementById('e').value;
            const loader = document.getElementById('load');
            const btn = this;

            if(!rVal || !eVal) return alert("Ingresá ambas direcciones");

            btn.disabled = true;
            loader.style.display = 'inline-block';

            const cR = await geo(rVal);
            const cE = await geo(eVal);

            if(cR && cE) {
                // MOVER MARCADORES
                mR.setLatLng([cR.lat, cR.lon]);
                mE.setLatLng([cE.lat, cE.lon]);

                // ¡ACÁ ESTÁ EL MOVIMIENTO! 
                // Usamos flyToBounds para que el mapa "vuele" y se mueva suave
                var group = new L.featureGroup([mR, mE]);
                m.flyToBounds(group.getBounds().pad(0.3), {
                    animate: true,
                    duration: 1.5 // Duración del vuelo en segundos
                });

                // Cálculo de Tarifa
                var dist = m.distance(mR.getLatLng(), mE.getLatLng()) / 1000;
                var t = dist <= 2 ? 3500 : dist <= 5 ? 4500 : 6000;

                document.getElementById('p').innerText = `$${t}`;
                document.getElementById('res').style.display = 'block';
            } else {
                alert("No encontramos una dirección. Revisá la numeración.");
            }

            btn.disabled = false;
            loader.style.display = 'none';
        };
    </script>
</body>
</html>
