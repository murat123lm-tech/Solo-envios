<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Envíos - Cotizador Profesional</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --color-violeta: #6C29BE; /* Tu violeta principal */
            --color-amarillo: #FFD700; /* Tu amarillo resaltador */
            --color-secundario: #28a745; /* Verde WhatsApp */
            --color-fondo: #f8f9fa;
        }
        
        body { background-color: var(--color-violeta); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; margin: 0; padding: 0; }
        
        /* Nav / Header */
        .navbar { background: white; border-bottom: 2px solid var(--color-amarillo); }
        .logo-img { max-height: 45px; } /* Cambia esto por la ruta de tu imagen de logo */
        
        /* Sección Principal (Hero) */
        .hero-section { background: white; color: #333; padding: 80px 0; }
        
        /* Tarjeta del Cotizador */
        .cotizador-card { background: white; color: #333; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: none; overflow: hidden; padding: 25px; }
        .precio-box { background-color: var(--color-amarillo); color: var(--color-violeta); border-radius: 15px; padding: 20px; font-weight: bold; text-align: center; }
        #precio-final { font-size: 3rem; margin: 0; }
        
        /* Mapa */
        .map-container { height: 400px; border-radius: 15px; border: 2px solid #ddd; }
        
        /* Botones */
        .btn-principal { background-color: var(--color-violeta); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; width: 100%; margin-top: 15px; }
        .btn-principal:hover { background-color: #5519a1; color: white; }
        
        .btn-whatsapp { background-color: var(--color-secundario); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; width: 100%; display: none; margin-top: 15px; text-decoration: none; text-align: center; }
        .btn-whatsapp:hover { background-color: #218838; color: white; }

        /* Estilo de sugerencias */
        .pac-container { border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border: none; z-index: 9999; }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="path/to/tu_logo.png" alt="Solo Envíos" class="logo-img me-2"> <span class="fs-4 fw-bold" style="color: var(--color-violeta)">Solo Envíos</span>
            </a>
            <button class="btn btn-primary rounded-pill btn-sm" style="background-color: var(--color-violeta); border: none;">Contratar</button>
        </div>
    </nav>

    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Tu Envío en San Miguel,<br>Cotizado al Instante</h1>
            <p class="lead text-muted mb-5">Ingresá la dirección de entrega y conocé el costo de tu logística profesional hoy mismo.</p>
        </div>
    </div>

    <div class="container pb-5" style="margin-top: -60px;">
        <div class="row">
            <div class="col-md-5">
                <div class="cotizador-card">
                    <h3 class="fw-bold mb-4">Ingresá los datos</h3>
                    <div class="mb-4">
                        <label for="direccion" class="form-label text-muted">Dirección de Entrega</label>
                        <input type="text" class="form-control form-control-lg rounded-pill border-2" id="direccion" placeholder="Ej: Av. Balbín 1500, San Miguel">
                    </div>
                    <button id="btn-cotizar" class="btn btn-principal">Calcular Costo</button>
                    
                    <div id="resultado" class="precio-box mt-4" style="display: none;">
                        <p class="mb-0">Tu costo estimado es:</p>
                        <p id="precio-final">$0</p>
                        <p id="zona-nombre" class="small mb-0"></p>
                    </div>
                    
                    <a id="btn-whatsapp" class="btn btn-whatsapp">Pedir por WhatsApp</a>
                </div>
            </div>
            <div class="col-md-7">
                <div class="map-container">
                    <div id="map" style="height: 100%; border-radius: 15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY_AQUÍ&libraries=places&language=es&region=AR"></script>

    <script>
        // --- COORDENADAS DE TUS 6 ZONAS (PROCESADAS) ---
        const zonas = [
            { id: "Zona 1", precio: "$3.500", coords: [[-58.7504672,-34.5519094], [-58.7650585,-34.565269], [-58.7442445,-34.5784851], [-58.7118434,-34.5842797], [-58.6806868,-34.581123], [-58.7372492,-34.5398203]] },
            { id: "Zona 2", precio: "$4.000", coords: [[-58.7380218,-34.5392072], [-58.7064361,-34.5622529], [-58.686695,-34.5433785], [-58.7179374,-34.5208934]] },
            { id: "Zona 3", precio: "$4.500", coords: [[-58.7062644,-34.5623943], [-58.6806868,-34.581123], [-58.6600875,-34.5631718], [-58.6865233,-34.5435199]] },
            { id: "Zona 4", precio: "$4.500", coords: [[-58.7380218,-34.5392072], [-58.7179374,-34.5208934], [-58.7286657,-34.509095], [-58.7574189,-34.5211002]] },
            { id: "Zona 5", precio: "$5.500", coords: [[-58.7286169,-34.5091529], [-58.6929328,-34.538589], [-58.67096,-34.5185423], [-58.6924178,-34.500224]] },
            { id: "Zona 6", precio: "$6.500", coords: [[-58.7051267,-34.4946132], [-58.6710089,-34.5186259], [-58.6461345,-34.501676], [-58.6736004,-34.4788965]] }
        ];

        let map, marker, autocomplete;

        function initMap() {
            // Centro inicial en San Miguel
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: -34.5438, lng: -58.7121 },
                zoom: 13,
                mapTypeControl: false,
                streetViewControl: false,
            });

            marker = new google.maps.Marker({ map: map });

            // Configurar autocompletado
            const input = document.getElementById("direccion");
            autocomplete = new google.maps.places.Autocomplete(input, { types: ["address"] });
            autocomplete.bindTo("bounds", map);
        }

        google.maps.event.addDomListener(window, 'load', initMap);

        document.getElementById("btn-cotizar").addEventListener("click", function() {
            const place = autocomplete.getPlace();
            if (!place || !place.geometry) {
                alert("Por favor, seleccioná una dirección de la lista sugerida.");
                return;
            }

            const lat = place.geometry.location.lat();
            const lng = place.geometry.location.lng();
            
            // Mover mapa y marcador
            map.setCenter({ lat, lng });
            map.setZoom(16);
            marker.setPosition({ lat, lng });

            // Calcular zona
            let zonaEncontrada = null;
            for (let z of zonas) {
                if (isPointInPoly(z.coords, [lng, lat])) {
                    zonaEncontrada = z;
                    break;
                }
            }

            // Mostrar resultados con TUS COLORES
            const resultado = document.getElementById("resultado");
            const btnWhatsapp = document.getElementById("btn-whatsapp");

            if (zonaEncontrada) {
                document.getElementById("precio-final").innerText = zonaEncontrada.precio;
                document.getElementById("zona-nombre").innerText = `Estás en: ${zonaEncontrada.id}`;
                resultado.style.display = "block";
                
                // Configurar WhatsApp (Cambia TU_NUMERO)
                const mensaje = `Hola Solo Envíos! Quiero un envío a ${place.formatted_address}. Cotizado en: ${zonaEncontrada.precio}`;
                btnWhatsapp.href = `https://wa.me/TU_NUMERO_AQUÍ?text=${encodeURIComponent(mensaje)}`;
                btnWhatsapp.style.display = "block";
            } else {
                alert("Fuera de cobertura. Lo sentimos!");
                resultado.style.display = "none";
                btnWhatsapp.style.display = "none";
            }
        });

        // Función matemática para detectar si el punto está dentro del polígono (Ray Casting)
        function isPointInPoly(poly, pt) {
            for(var c = false, i = -1, l = poly.length, j = l - 1; ++i < l; j = i)
                ((poly[i][1] <= pt[1] && pt[1] < poly[j][1]) || (poly[j][1] <= pt[1] && pt[1] < poly[i][1]))
                && (pt[0] < (poly[j][0] - poly[i][0]) * (pt[1] - poly[i][1]) / (poly[j][1] - poly[i][1]) + poly[i][0])
                && (c = !c);
            return c;
        }
    </script>
</body>
</html>
