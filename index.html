<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Envíos - Cotizador Gratis</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --color-violeta: #6C29BE;
            --color-amarillo: #FFD700;
            --color-secundario: #25D366;
        }
        body { background-color: var(--color-violeta); font-family: 'Segoe UI', sans-serif; color: white; margin: 0; }
        .navbar { background: white; border-bottom: 3px solid var(--color-amarillo); padding: 15px; }
        .hero-section { background: white; color: #333; padding: 40px 0; border-radius: 0 0 40px 40px; text-align: center; }
        .cotizador-card { 
            background: white; color: #333; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: none; 
            padding: 20px; margin-top: -30px;
        }
        #map { height: 350px; width: 100%; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 20px; }
        .precio-box { 
            background-color: var(--color-amarillo); color: var(--color-violeta); 
            border-radius: 15px; padding: 15px; text-align: center; display: none;
        }
        #precio-final { font-size: 2.5rem; font-weight: 900; margin: 0; }
        .btn-whatsapp { 
            background-color: var(--color-secundario); color: white; border: none; 
            padding: 12px; border-radius: 50px; font-weight: bold; width: 100%; 
            display: none; margin-top: 15px; text-decoration: none; text-align: center;
        }
    </style>
</head>
<body>

    <nav class="navbar shadow-sm">
        <div class="container justify-content-center">
            <span class="fs-4 fw-bold" style="color: var(--color-violeta)">SOLO ENVÍOS</span>
        </div>
    </nav>

    <div class="hero-section">
        <div class="container">
            <h1 class="fw-bold h3">Cotizá tu Envío en San Miguel</h1>
            <p class="text-muted small">Seleccioná la zona de entrega en el mapa</p>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="cotizador-card">
                    
                    <div id="map"></div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">O elegí la zona manualmente:</label>
                        <select class="form-select" id="select-zona">
                            <option value="" selected disabled>Seleccioná una zona...</option>
                            <option value="3500">Zona 1 - Centro San Miguel</option>
                            <option value="4000">Zona 2 - Muñiz / Bella Vista</option>
                            <option value="4500">Zona 3 - Sta. María / Trujui</option>
                            <option value="4500">Zona 4 - Los Polvorines</option>
                            <option value="5500">Zona 5 - Jose C. Paz</option>
                            <option value="6500">Zona 6 - Malvinas Argentinas</option>
                        </select>
                    </div>

                    <div id="resultado" class="precio-box">
                        <p class="mb-0 fw-bold">COSTO DEL ENVÍO:</p>
                        <p id="precio-final">$0</p>
                    </div>

                    <a id="btn-whatsapp" href="#" target="_blank" class="btn btn-whatsapp">
                        Pedir Envío por WhatsApp
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Inicializar mapa centrado en San Miguel
        var map = L.map('map').setView([-34.542, -58.712], 13);

        // 2. Cargar capas de OpenStreetMap (Gratis)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. Agregar un marcador movible para que el cliente marque dónde es
        var marker = L.marker([-34.542, -58.712], {draggable: true}).addTo(map);
        marker.bindPopup("<b>Arrastrame hasta tu entrega</b>").openPopup();

        // Lógica de precios
        const selector = document.getElementById('select-zona');
        const resultado = document.getElementById('resultado');
        const precioFinal = document.getElementById('precio-final');
        const btnWhatsapp = document.getElementById('btn-whatsapp');

        selector.addEventListener('change', function() {
            const precio = this.value;
            const nombreZona = this.options[this.selectedIndex].text;
            
            precioFinal.innerText = `$${precio}`;
            resultado.style.display = 'block';
            btnWhatsapp.style.display = 'block';

            // CONFIGURÁ TU WHATSAPP AQUÍ
            const miTelefono = "5491112345678"; 
            const mensaje = `Hola Solo Envíos! Quiero un envío a ${nombreZona}. Precio: $${precio}.`;
            btnWhatsapp.href = `https://wa.me/${miTelefono}?text=${encodeURIComponent(mensaje)}`;
        });
    </script>
</body>
</html>
