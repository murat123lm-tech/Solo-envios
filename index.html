<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Envíos - Cotizador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --color-v: #6C29BE; --color-a: #FFD700; }
        body { background-color: var(--color-v); font-family: sans-serif; color: white; padding: 20px 0; }
        .card-solo { background: white; color: #333; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #map { height: 350px; width: 100%; border-radius: 15px; margin: 15px 0; border: 2px solid #eee; }
        .btn-solo { background: var(--color-v); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; }
        .precio-box { background: var(--color-a); color: var(--color-v); border-radius: 15px; padding: 15px; text-align: center; margin-top: 15px; display: none; border: 3px solid var(--color-v); }
        label { font-weight: bold; color: var(--color-v); margin-bottom: 5px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card-solo text-center mb-3">
                    <h2 style="color: var(--color-v); font-weight: 900;">SOLO ENVÍOS</h2>
                </div>
                <div class="card-solo">
                    <label>📍 PUNTO DE RETIRO:</label>
                    <input type="text" id="r" class="form-control mb-3" placeholder="Dirección de retiro...">
                    
                    <label>🏁 PUNTO DE ENTREGA:</label>
                    <input type="text" id="e" class="form-control mb-3" placeholder="Dirección de entrega...">
                    
                    <button class="btn-solo" id="btn">CALCULAR TARIFA</button>
                    <div id="map"></div>
                    <div id="res" class="precio-box">
                        <p class="mb-0 fw-bold">TARIFA:</p>
                        <h2 id="p" style="font-weight: 900; font-size: 3rem; margin: 0;">$0</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        var m = L.map('map').setView([-34.542, -58.712], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
        var mR = L.marker([-34.542, -58.712], {draggable:true}).addTo(m);
        var mE = L.marker([-34.545, -58.715], {draggable:true}).addTo(m);

        document.getElementById('btn').onclick = function() {
            var vR = document.getElementById('r').value;
            var vE = document.getElementById('e').value;
            if(!vR || !vE) return alert("Completá retiro y entrega");

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(vR + ", San Miguel")}`)
            .then(res => res.json()).then(dR => {
                if(dR[0]) {
                    mR.setLatLng([dR[0].lat, dR[0].lon]);
                    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(vE + ", San Miguel")}`)
                    .then(res => res.json()).then(dE => {
                        if(dE[0]) {
                            mE.setLatLng([dE[0].lat, dE[0].lon]);
                            m.fitBounds(L.featureGroup([mR, mE]).getBounds().pad(0.3));
                            var d = m.distance(mR.getLatLng(), mE.getLatLng()) / 1000;
                            var t = d <= 2 ? 3500 : d <= 5 ? 4500 : 6000;
                            document.getElementById('p').innerText = `$${t}`;
                            document.getElementById('res').style.display = 'block';
                        }
                    });
                }
            });
        };
    </script>
</body>
</html>
